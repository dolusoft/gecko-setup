receivers:
  fluentforward:
    endpoint: 0.0.0.0:24224
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

connectors:
  routing:
    default_pipelines: [logs/log]
    table:
      - context: resource
        condition: attributes["log.type"] == "audit"
        pipelines: [logs/audit, logs/kafka-log]
      - context: resource
        condition: attributes["log.type"] == "filter_log"
        pipelines: [logs/filter-alert]
      - context: resource
        condition: attributes["log.type"] == "alert_log"
        pipelines: [logs/filter-alert]
      - context: resource
        condition: attributes["log.type"] == "log"
        pipelines: [logs/log, logs/kafka-log]

processors:
  transform/extract-resource:
    log_statements:
      - context: log
        statements:
          # Body'den resource attribute'a tasi (sadece Map body'li loglar icin - frontend/Fluent Bit)
          # IsMap(body) guard'i: .NET Str body'li loglarda body["..."] erisimi hata verir, bu guard korur
          - set(resource.attributes["service.name"], body["service.name"]) where IsMap(body) and resource.attributes["service.name"] == nil and body["service.name"] != nil
          - set(resource.attributes["service.version"], body["service.version"]) where IsMap(body) and resource.attributes["service.version"] == nil and body["service.version"] != nil
          - set(resource.attributes["log.type"], body["log.type"]) where IsMap(body) and resource.attributes["log.type"] == nil and body["log.type"] != nil
          # Severity fields
          - set(severity_text, body["severity_text"]) where IsMap(body) and body["severity_text"] != nil and severity_text == ""
          - set(severity_number, 9) where severity_text == "INFO" and severity_number == 0
          - set(severity_number, 13) where severity_text == "WARN" and severity_number == 0
          # Body'den temizle
          - delete_key(body, "service.name") where IsMap(body) and body["service.name"] != nil
          - delete_key(body, "service.version") where IsMap(body) and body["service.version"] != nil
          - delete_key(body, "log.type") where IsMap(body) and body["log.type"] != nil
          - delete_key(body, "severity_text") where IsMap(body) and body["severity_text"] != nil
  batch:
    send_batch_size: 10000
    timeout: 1s
  memory_limiter:
    check_interval: 2s
    limit_mib: 1800
    spike_limit_mib: 500

extensions:
  health_check:
  pprof:
    endpoint: :1888
  zpages:
    endpoint: :55679

exporters:
  clickhouse/default:
    endpoint: tcp://clickhouse:9000
    database: default
    ttl: 72h
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    username: default
    password: ${SERVICE_PASSWORD}

  clickhouse/audit:
    endpoint: tcp://clickhouse:9000
    database: default
    ttl: 0
    logs_table_name: otel_audits
    username: default
    password: ${SERVICE_PASSWORD}

  clickhouse/otel_filter_alert_logs:
    endpoint: tcp://clickhouse:9000
    database: default
    ttl: 0
    logs_table_name: otel_filter_alert_logs
    username: default
    password: ${SERVICE_PASSWORD}

  kafka/logs:
    brokers: ["kafka-1:9092", "kafka-2:9092"]
    topic: otel-logs
    encoding: otlp_json
    protocol_version: 2.6.0

  kafka/metrics:
    brokers: ["kafka-1:9092", "kafka-2:9092"]
    topic: otel-metrics
    encoding: otlp_json
    protocol_version: 2.6.0

  prometheus:
    endpoint: '0.0.0.0:8889'
  # prometheusremotewrite:
  #   endpoint: 'http://prometheus:9090/api/v1/write'

service:
  # telemetry:
  #   logs:
  #     level: "debug"
  #   metrics:
  #     level: "normal"
  extensions: [pprof, zpages, health_check]
  pipelines:
    logs/in:
      receivers: [otlp, fluentforward]
      processors: [transform/extract-resource]
      exporters: [routing]

    logs/audit:
      receivers: [routing]
      processors: [memory_limiter, batch]
      exporters: [clickhouse/audit]

    logs/filter-alert:
      receivers: [routing]
      processors: [memory_limiter, batch]
      exporters: [clickhouse/otel_filter_alert_logs]

    logs/log:
      receivers: [routing]
      processors: [memory_limiter, batch]
      exporters: [clickhouse/default]

    logs/kafka-log:
      receivers: [routing]
      processors: [memory_limiter]
      exporters: [kafka/logs]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse/default]
    metrics/in:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse/default, kafka/metrics]