worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/plain text/csv application/octet-stream;

    proxy_cache_path /var/cache/nginx/content
        levels=1:2
        keys_zone=content_cache:20m
        max_size=5g
        inactive=7d
        use_temp_path=off;

    server {
        listen 8090;
        server_name _;

        # Docker internal DNS — lazy resolution so nginx starts even if
        # contentapi is not yet up (it lives in a separate compose file).
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Public hotspot assets ────────────────────────────────────────
        # minio is in the same infra compose (depends_on), literal proxy_pass is safe.
        location /cdn/hotspot/ {
            proxy_pass         http://minio:9000/hotspot-assets/;

            proxy_cache        content_cache;
            proxy_cache_key    $request_uri;
            proxy_cache_valid  200 7d;
            proxy_cache_valid  404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            proxy_cache_lock   on;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;

            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Cache-Status $upstream_cache_status;

            proxy_set_header Host minio;
        }

        # ── Authenticated downloads via X-Accel-Redirect ────────────────
        # ContentApi validates JWT/source auth and returns X-Accel-Redirect.
        # Nginx handles byte transfer; ContentApi never streams file bytes.
        location /download/ {
            set $contentapi http://contentapi:8080;
            proxy_pass         $contentapi;
            proxy_pass_request_headers on;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_buffering    off;
        }

        # Internal MinIO fetch — only reachable via X-Accel-Redirect, never directly.
        # ContentApi sets Cache-Control: no-store for private/restricted files,
        # so only public/shared files end up cached here.
        location /x-minio/ {
            internal;
            rewrite            ^/x-minio/(.*)$ /$1 break;
            proxy_pass         http://minio:9000;
            proxy_pass_request_headers off;
            proxy_set_header   Host minio;

            proxy_cache        content_cache;
            proxy_cache_key    $uri;
            proxy_cache_valid  200 1h;
            proxy_cache_valid  404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            proxy_cache_lock   on;

            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Anonymous share token downloads ─────────────────────────────
        # contentapi is in a separate compose — use rewrite + variable so
        # nginx resolves the hostname at request time, not at startup.
        location /content/share/ {
            rewrite ^/content/share/(.*) /share/$1 break;
            set $contentapi http://contentapi:8080;
            proxy_pass         $contentapi;
            proxy_cache        off;
            proxy_buffering    off;
            proxy_read_timeout 60s;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   Host            $host;
        }

        # ── Health check ─────────────────────────────────────────────────
        location /healthz {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }
}
