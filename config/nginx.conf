user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    log_format stream_log '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received';
    access_log /var/log/nginx/stream_access.log stream_log;

    # Upstream for UDP port 514
    upstream listener_514_udp {
        random two least_conn;
        server listener-1:514 max_fails=3 fail_timeout=30s;
        server listener-2:514 max_fails=3 fail_timeout=30s;
    }

    # Upstream for TCP port 514
    upstream listener_514_tcp {
        random two least_conn;
        server listener-1:514 max_fails=3 fail_timeout=30s;
        server listener-2:514 max_fails=3 fail_timeout=30s;
    }

    # UDP 514 load balancer
    server {
        listen 514 udp reuseport;
        proxy_pass listener_514_udp;
        proxy_bind $remote_addr transparent;
        proxy_timeout 10s;
        proxy_responses 0;
        proxy_buffer_size 65536;
    }

    # TCP 514 load balancer
    server {
        listen 514 reuseport;
        proxy_pass listener_514_tcp;
        proxy_protocol on;
        proxy_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_buffer_size 65536;
    }
}
