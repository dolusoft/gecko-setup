services:
  # ---------------------------------------------------------------------------
  # KAFKA CONTROLLER (KRaft) — metadata only, no brokering
  # ---------------------------------------------------------------------------
  kafka-controller:
    image: apache/kafka:3.9.1
    container_name: kafka-controller
    hostname: kafka-controller
    restart: always
    init: true
    mem_limit: 768m
    memswap_limit: 768m
    networks:
      internal_network:
        ipv4_address: 172.20.0.100
    ports:
      - "39093:39093"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@kafka-controller:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:39093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'KafkaKRaftCluster'
      # Controller only needs a small heap — it handles metadata, not data
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=50"
    volumes:
      - kafka-controller-data:/var/lib/kafka/data
    stop_grace_period: 1m

  # ---------------------------------------------------------------------------
  # KAFKA BROKER 1
  # ---------------------------------------------------------------------------
  kafka-1:
    image: apache/kafka:3.9.1
    container_name: kafka-1
    hostname: kafka-1
    restart: always
    init: true
    # 2GB hard limit — the remaining ~1GB per broker goes to OS page cache.
    # On NVMe, page cache is your best friend; don't starve it with a big JVM.
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list || exit 1" ]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    networks:
      - internal_network
    ports:
      - "19092:19092"
    depends_on:
      kafka-controller:
        condition: service_started
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@kafka-controller:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://172.16.40.167:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'KafkaKRaftCluster'

      # --- Replication & durability ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      # --- Compression ---
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_LOG_COMPRESSION_TYPE: zstd

      # --- Retention: 24h with a 15GB byte cap per broker ---
      # Prevents unbounded disk growth; at 500k msg/s you'll want to revisit this.
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 16106127360
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

      # --- NVMe-optimised segment & flush settings ---
      # Larger segments = fewer files, less metadata overhead
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      # Let the OS handle flushing — NVMe doesn't need forced fsync like HDD did
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 9223372036854775807
      KAFKA_LOG_FLUSH_INTERVAL_MS: 9223372036854775807

      # --- NVMe-optimised threading ---
      # NVMe has very low latency; fewer threads avoids contention
      KAFKA_NUM_IO_THREADS: 4
      KAFKA_NUM_NETWORK_THREADS: 4
      KAFKA_NUM_REPLICA_FETCHERS: 2

      # --- Replication tuning for NVMe ---
      # Tighter lag window; NVMe replicas should never need 120s
      KAFKA_REPLICA_LAG_TIME_MAX_MS: 30000
      KAFKA_REPLICA_FETCH_MIN_BYTES: 1
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_WAIT_MAX_MS: 100

      # --- Consumer group / rebalance stability ---
      # Give consumers more time to rebalance without being evicted
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      # Delay initial rebalance to let all members join first
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000

      # --- Producer / broker request timeouts ---
      KAFKA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_METADATA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 120000
      KAFKA_BROKER_REGISTRATION_TIMEOUT_MS: 60000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 60000

      # --- Socket buffers: sized for high-throughput headroom ---
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600

      # --- Heap: 1GB max — leave the rest for OS page cache ---
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:G1HeapRegionSize=16m -XX:InitiatingHeapOccupancyPercent=35"

    volumes:
      - kafka-1-data:/var/lib/kafka/data
    stop_grace_period: 2m

  # ---------------------------------------------------------------------------
  # KAFKA BROKER 2
  # ---------------------------------------------------------------------------
  kafka-2:
    image: apache/kafka:3.9.1
    container_name: kafka-2
    hostname: kafka-2
    restart: always
    init: true
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-2:9092 --list || exit 1" ]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    networks:
      - internal_network
    ports:
      - "29092:29092"
    depends_on:
      kafka-controller:
        condition: service_started
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@kafka-controller:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://172.16.40.167:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'KafkaKRaftCluster'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_LOG_COMPRESSION_TYPE: zstd
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 16106127360
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 9223372036854775807
      KAFKA_LOG_FLUSH_INTERVAL_MS: 9223372036854775807
      KAFKA_NUM_IO_THREADS: 4
      KAFKA_NUM_NETWORK_THREADS: 4
      KAFKA_NUM_REPLICA_FETCHERS: 2
      KAFKA_REPLICA_LAG_TIME_MAX_MS: 30000
      KAFKA_REPLICA_FETCH_MIN_BYTES: 1
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_WAIT_MAX_MS: 100
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_METADATA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 120000
      KAFKA_BROKER_REGISTRATION_TIMEOUT_MS: 60000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 60000
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:G1HeapRegionSize=16m -XX:InitiatingHeapOccupancyPercent=35"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    stop_grace_period: 2m

  # ---------------------------------------------------------------------------
  # KAFKA BROKER 3
  # ---------------------------------------------------------------------------
  kafka-3:
    image: apache/kafka:3.9.1
    container_name: kafka-3
    hostname: kafka-3
    restart: always
    init: true
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-3:9092 --list || exit 1" ]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    networks:
      - internal_network
    ports:
      - "39092:39092"
    depends_on:
      kafka-controller:
        condition: service_started
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@kafka-controller:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://0.0.0.0:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://172.16.40.167:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'KafkaKRaftCluster'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_LOG_COMPRESSION_TYPE: zstd
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 16106127360
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 9223372036854775807
      KAFKA_LOG_FLUSH_INTERVAL_MS: 9223372036854775807
      KAFKA_NUM_IO_THREADS: 4
      KAFKA_NUM_NETWORK_THREADS: 4
      KAFKA_NUM_REPLICA_FETCHERS: 2
      KAFKA_REPLICA_LAG_TIME_MAX_MS: 30000
      KAFKA_REPLICA_FETCH_MIN_BYTES: 1
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_WAIT_MAX_MS: 100
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_METADATA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 120000
      KAFKA_BROKER_REGISTRATION_TIMEOUT_MS: 60000
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: 60000
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -XX:G1HeapRegionSize=16m -XX:InitiatingHeapOccupancyPercent=35"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    stop_grace_period: 2m

  # ---------------------------------------------------------------------------
  # CLICKHOUSE
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse:25.11
    user: "101:101"
    container_name: clickhouse
    restart: always
    networks:
      - internal_network
    hostname: clickhouse
    volumes:
      - ./config/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./config/log-retention.xml:/etc/clickhouse-server/users.d/log-retention.xml
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - CLICKHOUSE_USER=default
      - SERVICE_PASSWORD=${SERVICE_PASSWORD}
    ports:
      - "8124:8123"
      - "9001:9000"
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1

  # ---------------------------------------------------------------------------
  # MONGODB
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0.14
    container_name: mongodb
    hostname: mongodb
    restart: always
    networks:
      - internal_network
    ports:
      - '27018:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=default
      - MONGO_INITDB_ROOT_PASSWORD=${SERVICE_PASSWORD}
    volumes:
      - objectdata:/data/db
    command: mongod --wiredTigerCollectionBlockCompressor=zstd --wiredTigerJournalCompressor=zstd
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: '200M'
        reservations:
          cpus: '0.3'
          memory: '100M'

  # ---------------------------------------------------------------------------
  # REDIS
  # ---------------------------------------------------------------------------
  redis:
    image: redis/redis-stack-server:7.4.0-v5
    container_name: redis
    hostname: redis
    restart: always
    networks:
      - internal_network
    ports:
      - '6380:6379'
    environment:
      - REDIS_ARGS=--requirepass ${SERVICE_PASSWORD}
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: '500M'
        reservations:
          cpus: '0.3'
          memory: '100M'

  # ---------------------------------------------------------------------------
  # MINIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    hostname: minio
    restart: always
    networks:
      - internal_network
    expose:
      - "9000"
    ports:
      - "9002:9001"
      - "9003:9000"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: test2023!!
      MINIO_SERVER_URL: "http://minio:9000"
      MINIO_AUDIT_KAFKA_ENABLE: "on"
      MINIO_AUDIT_KAFKA_BROKERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      MINIO_AUDIT_KAFKA_TOPIC: "bucket-events"
      MINIO_NOTIFY_KAFKA_PRODUCER_COMPRESSION_CODEC: "zstd"
      MINIO_NOTIFY_KAFKA_PRODUCER_COMPRESSION_LEVEL: "3"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data1:/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '2G'
        reservations:
          cpus: '1.0'
          memory: '400M'

  # ---------------------------------------------------------------------------
  # MINIO INIT
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    restart: "no"
    networks:
      - internal_network
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 admin 'test2023!!'; do
        echo 'Waiting for MinIO...'; sleep 2;
      done;
      mc mb --ignore-existing local/hotspot-assets;
      mc anonymous set download local/hotspot-assets;
      mc mb --ignore-existing local/exports;
      echo 'MinIO init complete';
      "

  # ---------------------------------------------------------------------------
  # OTEL COLLECTOR
  # ---------------------------------------------------------------------------
  otelcollector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    hostname: otel-collector
    container_name: otel-collector
    networks:
      - internal_network
    command:
      - "--config=/etc/otel-collector-config.yml"
      - "--set=service.telemetry.logs.level=DEBUG"
    environment:
      - SERVICE_PASSWORD=${SERVICE_PASSWORD}
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - 4317:4317
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: '300M'
        reservations:
          cpus: '0.1'
          memory: '80M'

  # ---------------------------------------------------------------------------
  # NGINX LOAD BALANCER
  # ---------------------------------------------------------------------------
  nginx-lb:
    container_name: nginx-lb
    hostname: nginx-lb
    image: nginx:1.25-alpine
    restart: always
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal_network
    ports:
      - 514:514/udp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '64M'
        reservations:
          cpus: '0.1'
          memory: '32M'

  # ---------------------------------------------------------------------------
  # FREERADIUS
  # ---------------------------------------------------------------------------
  freeradius:
    image: freeradius/freeradius-server:3.2.7-alpine
    container_name: hotspot-freeradius
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./config/radius/entrypoint.sh:/entrypoint.sh:ro
      - ./config/radius/clients.conf:/opt/etc/raddb/clients.conf.template:ro
      - ./config/radius/mods-enabled/rest.conf:/opt/etc/raddb/mods-enabled/rest:ro
      - ./config/radius/sites-enabled/default:/tmp/radius-default:ro
    environment:
      - TZ=Europe/Istanbul
      - SHARED_PASSWORD=${SHARED_PASSWORD}
    restart: unless-stopped
    networks:
      - internal_network

  # ---------------------------------------------------------------------------
  # OPENLDAP
  # ---------------------------------------------------------------------------
  openldap:
    image: osixia/openldap:latest
    container_name: hotspot-openldap
    hostname: hotspot-openldap.gecko.local
    ports:
      - "389:389"
      - "636:636"
    environment:
      - LDAP_ORGANISATION=Gecko Project
      - LDAP_DOMAIN=gecko.local
      - LDAP_ADMIN_PASSWORD=${SHARED_PASSWORD}
      - LDAP_CONFIG_PASSWORD=${SHARED_PASSWORD}
      - LDAP_TLS=true
      - LDAP_TLS_VERIFY_CLIENT=never
      - LDAP_TLS_ENFORCE=false
    volumes:
      - openldap-conf:/etc/ldap/slapd.d
      - openldap-data:/var/lib/ldap
      - openldap-backups:/var/lib/openldap/openldap-backups
    restart: unless-stopped
    networks:
      - internal_network

  # ---------------------------------------------------------------------------
  # PHPLDAPADMIN
  # ---------------------------------------------------------------------------
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: hotspot-phpldapadmin
    ports:
      - "8080:80"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=hotspot-openldap
      - PHPLDAPADMIN_HTTPS=false
    depends_on:
      - openldap
    restart: unless-stopped
    networks:
      - internal_network

  # ---------------------------------------------------------------------------
  # KAFKA UI
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    restart: always
    networks:
      - internal_network
    ports:
      - "9080:8080"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: gecko-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
        reservations:
          cpus: '0.1'
          memory: '256M'

# -----------------------------------------------------------------------------
# VOLUMES
# -----------------------------------------------------------------------------
volumes:
  kafka-1-data:
    driver: local
  kafka-2-data:
    driver: local
  kafka-3-data:
    driver: local
  kafka-controller-data:
    driver: local
  clickhouse-data:
    driver: local
  redisdata:
  objectdata:
  minio_data1:
  openldap-conf:
  openldap-data:
  openldap-backups:

# -----------------------------------------------------------------------------
# NETWORKS
# -----------------------------------------------------------------------------
networks:
  internal_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
