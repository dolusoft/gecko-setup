services:
  # 3rd party infrastructure services
  kafka-1:
    image: apache/kafka:3.9.1
    container_name: kafka-1
    hostname: kafka-1
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - internal_network
    depends_on:
      kafka-controller:
        condition: service_started
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@172.20.0.10:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_LOG_COMPRESSION_TYPE: zstd
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 1800000
      CLUSTER_ID: 'KafkaKRaftCluster'
      KAFKA_BROKER_REGISTRATION_TIMEOUT_MS: 60000
      KAFKA_REQUEST_TIMEOUT_MS: 30000
      KAFKA_METADATA_REQUEST_TIMEOUT_MS: 60000
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
        reservations:
          cpus: '0.2'
          memory: '500M'

  kafka-2:
    image: apache/kafka:3.9.1
    container_name: kafka-2
    hostname: kafka-2
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-2:9092 --list || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - internal_network
    depends_on:
      kafka-controller:
        condition: service_started
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@172.20.0.10:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_LOG_COMPRESSION_TYPE: zstd
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 1800000
      CLUSTER_ID: 'KafkaKRaftCluster'
      KAFKA_BROKER_REGISTRATION_TIMEOUT_MS: 60000
      KAFKA_REQUEST_TIMEOUT_MS: 30000
      KAFKA_METADATA_REQUEST_TIMEOUT_MS: 60000
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
        reservations:
          cpus: '0.2'
          memory: '500M'

  kafka-controller:
    image: apache/kafka:3.9.1
    container_name: kafka-controller
    hostname: kafka-controller
    restart: always
    networks:
      internal_network:
        ipv4_address: 172.20.0.10
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: '3@kafka-controller:39093'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:39093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'KafkaKRaftCluster'
    volumes:
      - kafka-controller-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '700M'
        reservations:
          cpus: '0.2'
          memory: '150M'

  clickhouse:
    image: clickhouse:25.11
    user: "101:101"
    container_name: clickhouse
    restart: always
    networks:
      - internal_network
    hostname: clickhouse
    volumes:
      - ./config/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./config/log-retention.xml:/etc/clickhouse-server/users.d/log-retention.xml
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - CLICKHOUSE_USER=default
      - SERVICE_PASSWORD=${SERVICE_PASSWORD}
    ports:
      - "8124:8123"
      - "9001:9000"
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1

  mongodb:
    image: mongo:7.0.14
    container_name: mongodb
    hostname: mongodb
    restart: always
    networks:
      - internal_network
    ports:
      - '27018:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=default
      - MONGO_INITDB_ROOT_PASSWORD=${SERVICE_PASSWORD}
    volumes:
      - objectdata:/data/db
    command: mongod --wiredTigerCollectionBlockCompressor=zstd --wiredTigerJournalCompressor=zstd
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: '200M'
        reservations:
          cpus: '0.3'
          memory: '100M'

  redis:
    image: redis/redis-stack-server:7.4.0-v5
    container_name: redis
    hostname: redis
    restart: always
    networks:
      - internal_network
    ports:
      - '6380:6379'
    environment:
      - REDIS_ARGS=--requirepass ${SERVICE_PASSWORD}
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: '500M'
        reservations:
          cpus: '0.3'
          memory: '100M'

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    hostname: minio
    restart: always
    networks:
      - internal_network
    ports:
      - "9003:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: test2023!!
      MINIO_AUDIT_KAFKA_ENABLE: "on"
      MINIO_AUDIT_KAFKA_BROKERS: "kafka-1:9092,kafka-2:9092"
      MINIO_AUDIT_KAFKA_TOPIC: "bucket-events"
      MINIO_NOTIFY_KAFKA_PRODUCER_COMPRESSION_CODEC: "zstd"
      MINIO_NOTIFY_KAFKA_PRODUCER_COMPRESSION_LEVEL: "3"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data1:/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '2G'
        reservations:
          cpus: '1.0'
          memory: '400M'

  otelcollector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    hostname: otel-collector
    container_name: otel-collector
    networks:
      - internal_network
    command:
      - "--config=/etc/otel-collector-config.yml"
      - "--set=service.telemetry.logs.level=DEBUG"
    environment:
      - SERVICE_PASSWORD=${SERVICE_PASSWORD}
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - 4317:4317
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: '300M'
        reservations:
          cpus: '0.1'
          memory: '80M'

  chromadb:
    image: chromadb/chroma:1.0.9
    container_name: chromadb
    hostname: chromadb
    restart: always
    networks:
      - internal_network
    environment:
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=["http://localhost:3000"]
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/data
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '50M'
        reservations:
          cpus: '0.1'
          memory: '30M'

  nginx-lb:
    container_name: nginx-lb
    hostname: nginx-lb
    image: nginx:1.25-alpine
    restart: always
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal_network
    ports:
      - 514:514/udp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '64M'
        reservations:
          cpus: '0.1'
          memory: '32M'

  freeradius:
    image: freeradius/freeradius-server:3.2.7-alpine
    container_name: hotspot-freeradius
    entrypoint: [ "/bin/sh", "/entrypoint.sh" ]
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./config/radius/entrypoint.sh:/entrypoint.sh:ro
      - ./config/radius/clients.conf:/opt/etc/raddb/clients.conf.template:ro
      - ./config/radius/mods-enabled/rest.conf:/opt/etc/raddb/mods-enabled/rest:ro
      - ./config/radius/sites-enabled/default:/tmp/radius-default:ro
    environment:
      - TZ=Europe/Istanbul
      - SHARED_PASSWORD=${SHARED_PASSWORD}
    restart: unless-stopped
    networks:
      - internal_network

  openldap:
    image: osixia/openldap:1.5.0
    container_name: hotspot-openldap
    entrypoint: [ "/bin/bash", "/entrypoint-wrapper.sh", "--copy-service" ]
    ports:
      - "389:389"
      - "636:636"
    environment:
      - LDAP_ORGANISATION=Gecko Project
      - LDAP_DOMAIN=gecko.local
      - LDAP_ADMIN_PASSWORD=${SHARED_PASSWORD}
      - LDAP_CONFIG_PASSWORD=${SHARED_PASSWORD}
      - LDAP_TLS=false
      - LDAP_TLS_VERIFY_CLIENT=never
      - LDAP_REMOVE_CONFIG_AFTER_SETUP=false
      - SHARED_PASSWORD=${SHARED_PASSWORD}
    volumes:
      - openldap-data:/var/lib/ldap
      - openldap-config:/etc/ldap/slapd.d
      - ./config/ldap/entrypoint.sh:/entrypoint-wrapper.sh:ro
      - ./config/ldap/bootstrap.ldif:/tmp/bootstrap.ldif.template:ro
    restart: unless-stopped
    networks:
      - internal_network

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: hotspot-phpldapadmin
    ports:
      - "8080:80"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=hotspot-openldap
      - PHPLDAPADMIN_HTTPS=false
    depends_on:
      - openldap
    restart: unless-stopped
    networks:
      - internal_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    restart: always
    networks:
      - internal_network
    ports:
      - "9080:8080"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: gecko-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
        reservations:
          cpus: '0.1'
          memory: '256M'

volumes:
  chroma-data:
    driver: local
  kafka-1-data:
    driver: local
  kafka-2-data:
    driver: local
  kafka-controller-data:
    driver: local
  clickhouse-data:
    driver: local
  redisdata:
  objectdata:
  minio_data1:
  openldap-data:
  openldap-config:

networks:
  internal_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
